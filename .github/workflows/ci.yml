# PR and main CI run on GitHub-hosted Ubuntu only.
# Untrusted PR code must not execute on persistent self-hosted runners.

name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pr-gate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - run: node scripts/ci/workflow-permissions-lint.mjs

      - run: node scripts/ci/audit-action-pins.mjs

      - name: Sensitive path advisory
        if: github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: node scripts/ci/workflow-permissions-lint.mjs --advisory "$BASE_SHA"

  build-test:
    uses: ./.github/workflows/_reusable-build-test.yml
    permissions:
      contents: read
      actions: write

  wrangler-dry-run:
    uses: ./.github/workflows/_reusable-wrangler-dry-run.yml
    permissions:
      contents: read
      actions: write
