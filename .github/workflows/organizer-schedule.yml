# Scheduled organizer runs on self-hosted Windows (local .artifacts cache path).
# PR CI intentionally uses ubuntu-latest — do not move this job to self-hosted for PRs.

name: Organizer Schedule

on:
  schedule:
    # Daily at 12:00 UTC — scripts/run-organizer-scheduled.mjs enforces a 72h minimum interval
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: read
  actions: write

concurrency:
  group: organizer-schedule
  cancel-in-progress: false

jobs:
  organizer:
    runs-on: self-hosted
    defaults:
      run:
        shell: cmd
    env:
      NPM_CONFIG_SCRIPT_SHELL: cmd.exe
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm

      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: .artifacts/organizer-last-run.json
          key: organizer-last-run-state

      - run: npm ci

      - run: npm run organizer:scheduled

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: always()
        with:
          name: organizer-scheduled-report
          path: .artifacts/organizer-scheduled-report.json
          if-no-files-found: ignore
