name: Reusable Build and Test

on:
  workflow_call:
    inputs:
      ref:
        description: Git ref to checkout
        required: false
        type: string
      git_commit_sha:
        description: Build provenance commit SHA
        required: false
        type: string

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    env:
      GIT_COMMIT_SHA: ${{ inputs.git_commit_sha || github.sha }}
      BUILD_TIMESTAMP: ${{ github.event.pull_request.updated_at || github.event.head_commit.timestamp || '' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - uses: ./.github/actions/setup-node-npm
        with:
          node-version: "24"

      - run: npm run typecheck

      - run: npm test

      - run: npm run build

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: operator-build
          path: |
            dist/**
            dist/.build-manifest.json
          retention-days: 7
          if-no-files-found: error
