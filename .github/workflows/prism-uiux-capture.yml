name: PRISM UIUX Capture (optional)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prism-uiux-capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d34e6af2bda47ae351bd # v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npx playwright install --with-deps chromium

      - run: npm run build

      - name: Public capture smoke
        run: |
          npm run preview -- --host 127.0.0.1 --port 4175 --strictPort &
          node scripts/uiux/wait-for-url.mjs http://127.0.0.1:4175/services.html
          npm run uiux:capture:public
        env:
          PRISM_CAPTURE_ORIGIN: http://127.0.0.1:4175
          PRISM_CAPTURE_VIEWPORTS: mobile
          PRISM_CAPTURE_DRY_RUN: "false"
          CI: "true"

      - name: Verify artifacts contain no secrets
        run: npm run uiux:verify

      - name: Upload sanitized capture artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: prism-uiux-capture
          path: artifacts/uiux/**/*
          if-no-files-found: error
