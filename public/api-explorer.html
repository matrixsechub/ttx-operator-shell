<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSHOPS Public API Explorer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Inter+Tight:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/rgbgold-tokens.css" />
    <link rel="stylesheet" href="/styles/rgbgold-motion.css" />
    <link rel="stylesheet" href="/styles/rgbgold-components.css" />
    <link rel="stylesheet" href="/styles/rgbgold-hud.css" />
    <link rel="stylesheet" href="/styles/rgbgold-hooks.css" />
    <link rel="stylesheet" href="/api-explorer.css" />
    <link rel="stylesheet" href="/styles/a11y.css" />
  </head>
  <body>
    <div class="fx-overlay" aria-hidden="true"></div>
    <main class="page-shell">
      <section class="hero-panel bracket">
        <div class="bracket-inner">
          <p class="section-label mono">[ PUBLIC_API_EXPLORER ]</p>
          <h1>Explore the MSHOPS public API.</h1>
          <p class="hero-sub">Test public-safe endpoints, inspect JSON responses, and copy request snippets.</p>
          <div class="cta-row">
            <a class="button secondary" href="/">[ RETURN TO LANDING ]</a>
            <a class="button ghost" href="/marketplace?view=all">[ OPEN MARKETPLACE ]</a>
            <a class="button ghost" href="/os">[ OPEN OS ]</a>
          </div>
        </div>
      </section>

      <section class="section-block">
        <div class="section-heading">
          <p class="section-label mono">[ ENDPOINTS ]</p>
          <h2>Endpoint registry</h2>
        </div>
        <div class="public-api-grid" id="api-endpoint-grid"></div>
      </section>

      <section class="section-block">
        <article class="telemetry-card bracket">
          <div class="bracket-inner">
            <form class="agent-form" id="api-tester-form">
              <label>
                <span class="mono">[ ENDPOINT_PATH ]</span>
                <input id="api-path-input" type="text" value="/api/public/modules" required />
              </label>
              <div class="form-actions">
                <button class="button primary" type="submit">[ RUN REQUEST ]</button>
                <button class="button ghost" type="button" id="copy-curl-trigger">[ COPY CURL ]</button>
                <button class="button ghost" type="button" id="copy-fetch-trigger">[ COPY FETCH ]</button>
              </div>
              <p class="form-status mono" id="api-status">Explorer idle.</p>
            </form>
            <pre class="payload-json" id="api-response-viewer">Awaiting endpoint response.</pre>
          </div>
        </article>
      </section>
    </main>

    <script src="/api-explorer.js" defer></script>
    <script src="/scripts/a11y.js" defer></script>
    <script src="/scripts/drift.js" defer></script>
    <script src="/scripts/a11y-scan.js" defer></script>
    <script src="/scripts/motion-scan.js" defer></script>
    <script src="/scripts/hud-scan.js" defer></script>
    <script src="/scripts/ecosystem-health.js" defer></script>
  </body>
</html>
